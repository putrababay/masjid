<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart TV Masjid An-Nur - Dynamic System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg-main: #f1f5f9;
            --primary-green: #064e3b;
            --accent-green: #10b981;
            --soft-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --gold-soft: #fbbf24;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-main);
            font-family: "Plus Jakarta Sans", sans-serif;
            color: var(--text-main);
            font-size: 1.8vh;
        }

        .app-container {
            display: grid;
            grid-template-rows: 1fr auto auto;
            height: 100vh;
            width: 100vw;
        }

        .content-area {
            display: flex;
            margin: 1.5vh 0.5vw;
            gap: 0.8vw;
        }

        .slider-container {
            flex: 1;
            background: #000;
            border-radius: 1.5vw;
            position: relative;
            overflow: hidden;
            box-shadow: 0 1vh 3vh rgba(0, 0, 0, 0.25);
        }

        .slider-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            object-fit: cover;
        }

        .slider-item.active {
            opacity: 1;
        }

        .slider-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 0.6vh;
            width: 0%;
            background: linear-gradient(90deg, #10b981, #fbbf24);
            transition: width linear;
            z-index: 99;
        }

        .qris-panel {
            width: 20vw;
            background: #ffffff;
            border-radius: 1.2vw;
            display: flex;
            flex-direction: column;
            padding: 0.6vw;
            box-shadow: 0 1vh 2vh rgb(8 100 73 / 36%);
            justify-content: space-between;
        }

        .qris-panel .panel-header .clock-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-green);
            line-height: 1;
            margin-bottom: 1.5vh;
            font-variant-numeric: tabular-nums;
            text-align: center;
        }

        .qris-panel .panel-header .clock-display span {
            font-size: 1.5rem;
            color: var(--accent-green);
            font-weight: 600;
        }

        .qris-panel .panel-header .masjid-title h1 {
            font-size: 1.2rem;
            margin: 0.5vh 0 0 0;
            color: var(--primary-green);
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
        }

        .qris-panel .panel-header .masjid-title .text-muted {
            font-size: 0.85rem;
            text-align: center;
        }

        .info-date-container {
            margin-top: 1.5vh;
            display: flex;
            justify-content: center;
            height: 3.5vh;
        }

        .date-badge {
            display: none;
            background: var(--bg-main);
            color: var(--primary-green);
            padding: 0.4vh 0.8vw;
            border-radius: 2vw;
            align-items: center;
            gap: 0.5vw;
            animation: fadeIn 0.5s ease-in-out;
            border: 1px solid #cbd5e1;
        }

        .date-badge.active {
            display: flex;
        }

        .date-badge .date-label {
            font-size: 0.65rem;
            font-weight: 800;
            background: var(--primary-green);
            color: white;
            padding: 0.2vh 0.6vw;
            border-radius: 1vw;
        }

        .qris-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 0.5vw;
            border-radius: 1vw;
            text-align: center;
            margin-bottom: 1.5vh;
            border: 0.15vw dashed #cbd5e1;
        }

        .qris-img {
            width: 10vw;
            height: auto;
            background: white;
            padding: 0.5vw;
            border-radius: 0.8vw;
        }

        .mosque-detail-info {
            font-size: 0.7rem;
            background: #f8fafc;
            padding: 1vw;
            border-radius: 0.8vw;
            height: 35%;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6vh 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-value {
            font-weight: 700;
            color: var(--primary-green);
            text-align: right;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-green);
            font-weight: 800;
            margin-bottom: 0.5vh;
            margin-top: 1vh;
        }

        .info-slide {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .info-slide.active {
            display: block;
        }

        .finance-section {
            background: linear-gradient(90deg, var(--primary-green), #022c22);
            color: #fff;
            padding: 1.2vh 0;
            font-size: 1.2rem;
            font-weight: 600;
            border-top: 0.2vh solid var(--accent-green);
        }

        .prayer-footer {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.8vw;
            padding: 0.1vh 0.1vw;
        }

        .prayer-box {
            background: linear-gradient(145deg, #b6edd4 0%, rgba(240, 253, 244, 0.9) 100%);
            text-align: center;
            padding: 0.5vh 0.5vw;
            border-radius: 0.8vw;
            border-bottom: 1.2vh solid #a7f3d0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prayer-name {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .prayer-time {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-green);
            line-height: 1;
        }

        .prayer-box.next {
            background: linear-gradient(135deg, var(--accent-green), var(--primary-green));
            color: #fff;
            border-bottom: 1.2vh solid #fbbf24;
            transform: translateY(-1.2vh);
            box-shadow: 0 1.2vh 2.5vh rgba(16, 185, 129, 0.3);
        }

        .prayer-box.next .prayer-name,
        .prayer-box.next .prayer-time {
            color: #fff !important;
        }

        .countdown-tag {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.2vh 0.8vw;
            border-radius: 1vw;
            font-weight: 700;
        }

        .prayer-banner {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
            padding: 1vh 2vw;
            border-radius: 0.8vw;
            color: white;
            font-weight: 800;
            box-shadow: 0 1vh 2vh rgba(0, 0, 0, 0.15);
        }

        .adzan-prep {
            background: linear-gradient(135deg, #ef4444, #991b1b);
        }

        .iqomah-prep {
            background: linear-gradient(135deg, #f59e0b, #b45309);
        }

        .sholat-prep {
            background: linear-gradient(135deg, #10b981, #047857);
        }

        .sholat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }

        .sholat-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sholat-overlay-timer {
            font-size: 10rem;
            font-weight: 800;
            background: #10b981c7;
            padding: 1vh 4vw;
            border-radius: 2vw;
            margin-bottom: 6vh;
        }

        .sholat-overlay-verse-ar {
            font-size: 4rem;
            color: var(--gold-soft);
            font-family: serif;
            margin-bottom: 2vh;
        }

        .slider-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9998;
            border-radius: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="content-area">
            <div class="slider-container" id="slider">
                <div id="slider-target"></div>
                <div id="sliderProgress" class="slider-progress"></div>
            </div>

            <div class="qris-panel">
                <div class="panel-header">
                    <div class="clock-display" id="digital-clock">00:00<span>:00</span></div>
                    <div class="masjid-title">
                        <h1 id="dyn-name">--</h1>
                        <div class="text-muted small" id="dyn-address">--</div>
                    </div>
                    <div class="info-date-container">
                        <div class="date-badge active" id="badge-hijri">
                            <span class="date-label">HIJRIAH</span>
                            <span class="date-value" id="hijri-date">--</span>
                        </div>
                        <div class="date-badge" id="badge-masehi">
                            <span class="date-label">MASEHI</span>
                            <span class="date-value" id="masehi-date">--</span>
                        </div>
                    </div>
                </div>

                <div class="qris-card">
                    <div class="small fw-bold mb-2 text-uppercase text-muted">Infaq & Sedekah</div>
                    <img id="dyn-qris-img" src="" class="qris-img mb-2" />
                    <div class="small text-dark fw-bold" id="dyn-qris-text">--</div>
                </div>

                <div class="mosque-detail-info" id="info-slides-target"></div>
            </div>
        </div>

        <div class="prayer-footer" id="prayer-list"></div>

        <div class="finance-section">
            <marquee scrollamount="5" id="dyn-marquee"></marquee>
        </div>
    </div>

    <div class="sholat-overlay" id="sholat-overlay">
        <div style="font-size: 3.5rem; font-weight: 700; letter-spacing: 0.3rem;" id="sholat-title">SHOLAT BERLANGSUNG
        </div>
        <div class="sholat-overlay-timer" id="sholat-timer">00:00</div>
        <div class="sholat-overlay-verse-ar">إِنَّ الصَّلَاةَ تَنْهَىٰ عَنِ الْفَحْشَاءِ وَالْمُنْكَرِ</div>
        <div style="font-size: 1.6rem; font-style: italic; color: #94a3b8; max-width: 80vw; margin-bottom: 6vh;">
            "Sesungguhnya shalat itu mencegah dari perbuatan keji dan mungkar." (QS. Al-Ankabut: 45)</div>
        <div
            style="font-size: 2rem; color: #ef4444; border: 1px solid #ef4444; padding: 1.5vh 3vw; border-radius: 1vw;">
            MOHON NONAKTIFKAN HANDPHONE</div>
    </div>

    <script>
        const APP_CONFIG = {
            mosque: {
                profile: {
                    name: "MASJID AN-NUR SIDOARJO",
                    address: "Jl. Mojopahit No.666, Celep, Kabupaten Sidoarjo Jawa Timur",
                    id: "MNR-SDA01",
                    capacity: "800 Jamaah",
                    qrisData: "DonasiMasjidAnNurSidoarjo",
                    qrisText: "Scan QRIS a.n Masjid An-Nur"
                },
                infoSlides: [
                    {
                        label: "Informasi Masjid",
                        content: [
                            { key: "ID Masjid", value: "MNR-SDA01" },
                            { key: "Kapasitas", value: "800 Jamaah" }
                        ]
                    },
                    {
                        label: "Susunan Takmir",
                        content: [
                            { key: "Ketua", value: "H. Ahmad Fulan" },
                            { key: "Sekretaris", value: "Budi Santoso, ST" },
                            { key: "Bendahara", value: "H. M. Mansur" }
                        ]
                    },
                    {
                        label: "Laporan Keuangan",
                        content: [
                            { key: "Saldo Awal", value: "Rp 15.000.000" },
                            { key: "Saldo Akhir", value: "Rp 18.350.000" },
                            { key: "Update", value: "10 Maret 2026" }
                        ]
                    }
                ],
                announcements: [
                    "Laporan Keuangan: Saldo Kas Rp 18.350.000 (Per 20 Feb)",
                    "Agenda: Kajian Ahad Pagi bersama Ust. Dr. Malik Aris di Ruang Utama",
                    "Mohon menonaktifkan suara handphone saat memasuki area Shalat",
                    "Jagalah kebersihan Masjid adalah sebagian dari Iman"
                ]
            },
            slider: [
                { type: 'youtube', id: 'F8121v_ER9M', isLive: false },
                { type: 'youtube', id: 'OFLYbSRpMdg', isLive: true },
                { type: 'image', src: '1.jpg' },
                { type: 'image', src: '11.jpg' },
                { type: 'image', src: '2.jpg' }
            ],
            settings: {
                locationId: "cfa0860e83a4c3a763a7e62d825349f7",
                imageDuration: 15000,
                liveDuration: 180000,
            }
        };

        let currentJadwal = {};
        let player = null;
        let slideIdx = 0;
        let slideTimeout = null;

        function initUI() {
            document.getElementById('dyn-name').innerText = APP_CONFIG.mosque.profile.name;
            document.getElementById('dyn-address').innerText = APP_CONFIG.mosque.profile.address;
            document.getElementById('dyn-qris-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${APP_CONFIG.mosque.profile.qrisData}`;
            document.getElementById('dyn-qris-text').innerText = APP_CONFIG.mosque.profile.qrisText;
            document.getElementById('dyn-marquee').innerHTML = APP_CONFIG.mosque.announcements.map(t => `<span class="mx-5">● ${t}</span>`).join('');

            const slidesHtml = APP_CONFIG.mosque.infoSlides.map((s, i) => `
                <div class="info-slide ${i === 0 ? 'active' : ''}">
                    <div class="section-label">${s.label}</div>
                    ${s.content.map(c => `<div class="info-row"><span class="info-label">${c.key}</span><span class="info-value">${c.value}</span></div>`).join('')}
                </div>
            `).join('');
            document.getElementById('info-slides-target').innerHTML = slidesHtml;

            const sliderHtml = APP_CONFIG.slider.map((item, i) => {
                if (item.type === 'image') return `<img class="slider-item ${i === 0 ? 'active' : ''}" src="${item.src}">`;
                return `<div class="slider-item ${i === 0 ? 'active' : ''}" id="p-${i}" data-vid="${item.id}" data-live="${item.isLive}"></div>`;
            }).join('');
            document.getElementById('slider-target').innerHTML = sliderHtml;
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById("digital-clock").innerHTML = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}<span>:${String(now.getSeconds()).padStart(2, "0")}</span>`;
                updateCountdown();
            }, 1000);
        }

        async function updateDates() {
            try {
                const res = await fetch("https://api.myquran.com/v3/cal/today");
                const r = await res.json();
                if (r.status) {
                    document.getElementById("hijri-date").innerText = `${r.data.hijr.day} ${r.data.hijr.monthName} ${r.data.hijr.year} H`;
                    document.getElementById("masehi-date").innerText = r.data.ce.today;
                }
            } catch (e) { console.error("Date Error"); }
        }

        async function getPrayerTimes() {
            const d = new Date();
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
            try {
                const res = await fetch(`https://api.myquran.com/v3/sholat/jadwal/${APP_CONFIG.settings.locationId}/${key}`);
                const r = await res.json();
                if (r.status) {
                    currentJadwal = r.data.jadwal[key];
                    renderSholat(currentJadwal);
                }
            } catch (e) { console.error("Prayer API Error"); }
        }

        function renderSholat(j) {
            const list = [
                { id: "imsak", n: "Imsak", t: j.imsak }, { id: "subuh", n: "Subuh", t: j.subuh },
                { id: "terbit", n: "Terbit", t: j.terbit }, { id: "dhuha", n: "Dhuha", t: j.dhuha },
                { id: "dzuhur", n: "Dzuhur", t: j.dzuhur }, { id: "ashar", n: "Ashar", t: j.ashar },
                { id: "maghrib", n: "Maghrib", t: j.maghrib }, { id: "isya", n: "Isya", t: j.isya }
            ];
            document.getElementById("prayer-list").innerHTML = list.map(s => `
                <div class="prayer-box" id="box-${s.id}" data-time="${s.t}">
                    <div class="prayer-name">${s.n}</div>
                    <div class="prayer-time">${s.t}</div>
                    <div class="countdown-area" style="height:1.2rem;"></div>
                </div>
            `).join("");
            updateCountdown();
        }

        function updateCountdown() {
            if (!currentJadwal.imsak) return;
            const now = new Date();
            const checkIds = ["subuh", "dzuhur", "ashar", "maghrib", "isya"];
            let next = null;

            for (let id of checkIds) {
                const [h, m] = currentJadwal[id].split(":");
                const target = new Date();
                target.setHours(h, m, 0);

                let iqDur = (id === "subuh" || id === "dzuhur" || id === "isya") ? 25 : 20;
                const adzanStart = new Date(target);
                const iqomahEnd = new Date(target.getTime() + iqDur * 60000);
                const sholatEnd = new Date(iqomahEnd.getTime() + 15 * 60000);

                if (now < sholatEnd) {
                    next = { id, target, adzanStart, iqomahEnd, sholatEnd };
                    break;
                }
            }

            const footer = document.getElementById("prayer-list");
            if (!next) {
                if (!footer.querySelector(".prayer-box")) renderSholat(currentJadwal);
                return;
            }

            let phase = "normal";
            let diff = next.adzanStart - now;

            if (now < next.adzanStart) {
                if (diff <= 600000) phase = "pre-adzan";
            } else if (now < next.iqomahEnd) {
                phase = "iqomah";
                diff = next.iqomahEnd - now;
            } else if (now < next.sholatEnd) {
                phase = "sholat";
                diff = next.sholatEnd - now;
            }

            const timeStr = `-${Math.floor(diff / 60000)}:${String(Math.floor((diff % 60000) / 1000)).padStart(2, '0')}`;
            const overlay = document.getElementById("sholat-overlay");

            if (phase === "normal") {
                overlay.classList.remove("active");
                if (!footer.querySelector(".prayer-box")) renderSholat(currentJadwal);
                document.querySelectorAll(".prayer-box").forEach(b => {
                    b.classList.remove("next");
                    b.querySelector(".countdown-area").innerHTML = "";
                });
                const box = document.getElementById(`box-${next.id}`);
                if (box) {
                    box.classList.add("next");
                    box.querySelector(".countdown-area").innerHTML = `<span class="countdown-tag">${timeStr}</span>`;
                }
            } else {
                document.getElementById("slider").classList.remove("fullscreen");
                const titles = { "pre-adzan": "MENUJU ADZAN", "iqomah": "MENUJU IQOMAH", "sholat": "SHOLAT BERLANGSUNG" };
                const classes = { "pre-adzan": "adzan-prep", "iqomah": "iqomah-prep", "sholat": "sholat-prep" };

                footer.innerHTML = `<div class="prayer-banner ${classes[phase]}"><div style="font-size:1.5rem;">${titles[phase]} ${next.id.toUpperCase()}</div><div style="font-size:2.5rem;">${timeStr}</div></div>`;

                if (phase === "sholat") {
                    overlay.classList.add("active");
                    document.getElementById("sholat-timer").innerText = timeStr.replace("-", "");
                    document.getElementById("sholat-title").innerText = `SHOLAT ${next.id.toUpperCase()}`;
                } else {
                    overlay.classList.remove("active");
                }
            }
        }

        // SLIDER ENGINE
        function handleSlide() {
            const slides = document.querySelectorAll('.slider-item');
            slides.forEach(s => s.classList.remove('active'));
            const current = slides[slideIdx];
            current.classList.add('active');

            const bar = document.getElementById('sliderProgress');
            bar.style.transition = 'none';
            bar.style.width = '0%';

            if (current.tagName === 'IMG') {
                if (player) player.pauseVideo();
                const dur = APP_CONFIG.settings.imageDuration;
                setTimeout(() => { bar.style.transition = `width ${dur}ms linear`; bar.style.width = '100%'; }, 50);
                slideTimeout = setTimeout(nextSlide, dur);
            } else {
                const vid = current.getAttribute('data-vid');
                const isLive = current.getAttribute('data-live') === 'true';
                if (player) player.destroy();
                player = new YT.Player(current.id, {
                    videoId: vid,
                    playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'enablejsapi': 1 },
                    events: {
                        'onReady': (e) => {
                            const dur = isLive ? APP_CONFIG.settings.liveDuration : (e.target.getDuration() * 1000);
                            bar.style.transition = `width ${dur}ms linear`;
                            bar.style.width = '100%';
                            slideTimeout = setTimeout(nextSlide, dur);
                        },
                        'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) nextSlide(); }
                    }
                });
            }
        }

        function nextSlide() {
            clearTimeout(slideTimeout);
            const slides = document.querySelectorAll('.slider-item');
            slideIdx = (slideIdx + 1) % slides.length;
            handleSlide();
        }

        function onYouTubeIframeAPIReady() { handleSlide(); }

        window.addEventListener('DOMContentLoaded', () => {
            initUI();
            startClock();
            updateDates();
            getPrayerTimes();

            // Rotasi info & tanggal
            setInterval(() => {
                const s = document.querySelectorAll('.info-slide');
                let act = [...s].findIndex(el => el.classList.contains('active'));
                s[act].classList.remove('active');
                s[(act + 1) % s.length].classList.add('active');
            }, 60000);

            setInterval(() => {
                const b = document.querySelectorAll('.date-badge');
                b[0].classList.toggle('active'); b[1].classList.toggle('active');
            }, 15000);

            setInterval(() => {
                if (!document.getElementById('sholat-overlay').classList.contains('active')) {
                    document.getElementById('slider').classList.toggle('fullscreen');
                }
            }, 180000);
        });
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>

</html>
